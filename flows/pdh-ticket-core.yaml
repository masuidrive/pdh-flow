flow: pdh-ticket-core
version: 1
defaults:
  timeoutMinutes: 60
  idleTimeoutMinutes: 5
  maxAttempts: 2
  reviewMaxRounds: 6
  reviewRepairProvider: codex

variants:
  light:
    initial: PD-C-1
    sequence:
      - PD-C-1
      - PD-C-3
      - PD-C-5
      - PD-C-6
      - PD-C-7
      - PD-C-9
      - PD-C-10
  full:
    initial: PD-C-1
    sequence:
      - PD-C-1
      - PD-C-3
      - PD-C-4
      - PD-C-5
      - PD-C-6
      - PD-C-7
      - PD-C-8
      - PD-C-9
      - PD-C-10

# Team composition. Step yaml owns "what this step is"; the flow owns
# "who runs it". providers / reviewers[].aggregator / reviewers[].repair
# are variant-keyed maps so full and light can run different agents on
# the same logical step. A missing variant key means the step does not
# run in that variant — flow.variants[].sequence is still the
# authoritative inclusion list, this just keeps both sides aligned.
providers:
  PD-C-1:
    full: claude
    light: claude
  PD-C-3:
    full: codex
    light: codex
  PD-C-5:
    full: claude
    light: claude
  PD-C-6:
    full: codex
    light: codex
  PD-C-8:
    full: claude
  PD-C-10:
    full: claude
    light: claude

reviewers:
  PD-C-4:
    aggregator:
      full: claude
    repair:
      full: codex
    maxInPlaceRepairs: 2
    full:
      - role: devils_advocate
        provider: claude
        count: 2
        focus:
          - 計画の修正方針に矛盾や見落としがないか
          - セキュリティや設計上の懸念を先回りして潰せているか
      - role: coding_engineer_reviewer
        provider: claude
        count: 1
        focus:
          - 技術的実現可能性
          - 依存関係と既存パターンとの整合
          - 実装量と検証量の妥当性
      - role: critical_reviewer
        provider: codex
        count: 1
        focus:
          - 致命的な問題だけを短く指摘する
  PD-C-7:
    aggregator:
      full: claude
      light: claude
    repair:
      full: codex
      light: codex
    maxInPlaceRepairs: 2
    full:
      - role: devils_advocate
        provider: claude
        count: 2
        focus:
          - セキュリティ脆弱性
          - 設計上の論理バグ
          - 目的から見た危険な抜け
      - role: code_reviewer
        provider: claude
        count: 2
        focus:
          - コード品質
          - 回帰
          - 認可漏れと整合性
          - エラーハンドリングとテスト妥当性
      - role: critical_reviewer
        provider: codex
        count: 1
        focus:
          - 致命的な問題だけを短く指摘する
    light:
      - role: devils_advocate
        provider: claude
        count: 1
        focus:
          - セキュリティ脆弱性
          - 設計上の論理バグ
      - role: critical_reviewer
        provider: codex
        count: 1
        focus:
          - 致命的な問題だけを短く指摘する
  PD-C-9:
    aggregator:
      full: codex
      light: codex
    repair:
      full: codex
      light: codex
    maxInPlaceRepairs: 2
    full:
      - role: ac_verifier
        provider: claude
        count: 1
        focus:
          - AC ごとの証跡、分類、deferred の妥当性
          - 最終検証コマンドと結果
      - role: surface_observer
        provider: claude
        count: 1
        focus:
          - UI / HTTP API / SDK / CLI の consumer 視点の違和感
          - エラー文言や情報ヒエラルキーの破綻
    light:
      - role: ac_verifier
        provider: claude
        count: 1
        focus:
          - AC ごとの証跡、分類、最終検証結果

models: {}

# Button labels for the Web UI's "Next" card. Keys are
# (action, context) — same action ("Run Next") shows a different
# description depending on whether the runtime is at the default
# state, blocked, stuck, etc. Per-step approve labels live on
# step.display.approve in each step yaml; this section is for the
# runtime-level actions that don't belong to any single step.
actionLabels:
  run:
    label: Run
    description: 新しい flow を開始して .pdh-flow/runtime.json の runtime state を初期化します。
  runNext:
    label: Run Next
    description: 通常進行です。次の gate / interruption / failure / complete まで自動で進めます。
  runNextAdvance:
    label: Run Next
    description: 完了済み step の guard 評価と flow transition を進めます。
  runNextStuck:
    label: Run Next
    description: この worktree で run-next を spawn し直して provider 実行を始めます。
  runNextBlocked:
    label: Run Next
    description: 不足している guard-facing artifact を補完したうえで、この step を再評価します。
  resume:
    label: Resume
    description: 同じ step を再実行します。
  openTerminal:
    label: Open Terminal
    description: current step の repo state を terminal で確認したり、会話しながら調査します。
  openTerminalAdvance:
    label: Open Terminal
    description: 次に進める前に current repo state を terminal で確認します。
  openTerminalFailed:
    label: Open Terminal
    description: failure-summary と artifacts を assist で確認し、原因に応じて手で修正します。修正後は assist から `assist-signal --signal continue` を送って runtime に再評価させます。
  openTerminalStale:
    label: Open Terminal
    description: stale running になる直前の変更や reviewer 指摘を確認します。
  openTerminalBlocked:
    label: Open Terminal
    description: 止まった理由を assist と一緒に確認し、必要な変更や検証をその場で詰めます。
  openTerminalStuck:
    label: Open Terminal
    description: 復旧前に worktree の状態を terminal で確認します。
  openTerminalGate:
    label: Open Terminal
    description: 判断に迷う場合は assist と一緒にコード・テスト・関連ドキュメントを確認できます。必要なら assist の中で修正・検証も実施可能です。
  openTerminalInterrupt:
    label: Open Terminal
    description: 質問に答える前に assist でコードとテストを確認し、そのまま回答します。

# Card-level title/body for the Web UI's "Next" panel. {stepId} is
# interpolated from the current step. Bodies that are computed at
# runtime (failure summary, guard evidence, supervisor pid/command,
# stale process note) keep their inline construction in JS — only the
# pure-string templates live here.
actionCards:
  initial:
    title: 最初にすること
    body: "repo root で `run` を実行して .pdh-flow/runtime.json を初期化します。"
  needsHuman:
    title: "{stepId} の判断"
    body: ""
  interrupt:
    title: "{stepId} の割り込み回答"
    body: "質問内容を確認して回答します。必要なら assist でコードやテストを見てから `answer` を返します。"
  failed:
    title: "{stepId} の失敗を解析"
  advance:
    title: "{stepId} の遷移を進める"
    body: "この step の provider/review は完了しています。`run-next` で guard 評価と次 step への遷移を進めます。必要なら先に Open Terminal で差分や note/ticket を確認します。"
  stale:
    title: "{stepId} の再実行"
    bodyFallback: "provider process は終了していますが、runtime state は running のままです。summary を確認してから再実行します。"
  blocked:
    title: "{stepId} の不足を解消"
  default:
    title: "{stepId} を進める"
    body: ""
  inFlight:
    title: "{stepId} 実行中"
    body: "{command} (pid={pid}) が {stepId} を実行しています。完了すると次の gate / interruption / failure に切り替わります。"
  stuck:
    title: "{stepId} 再開"
    body: "runtime.json は running ですが supervisor が居ません ({supervisorStatus})。古い session の取りこぼしか、background run-next が早期終了した可能性があります。Run Next で worktree に対して再 spawn して再開できます。"
