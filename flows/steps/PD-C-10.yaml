id: PD-C-10
role: close_gate
mode: edit
humanGate: true
noteSection: PD-C-10. クローズ準備
commitSummary: Close gate
judgement:
  kind: close-gate
  acceptedStatuses:
    - Ready
    - user_accepted
display:
  label: 完了承認
  summary: agent が close-gate 判断材料を ui-output.json に集約し、人間が明示承認して ticket close へ進める gate。
  userAction: agent が出した close summary を確認し、AC 裏取り・差分・残リスクを見て Yes / No を選ぶ。
  viewer: 承認者
  decision: この ticket を close してよいかを判断する。
  readTicketHeading: "## Product AC"
  readNoteHeadings:
    - "## PD-C-9. AC 裏取り結果"
    - "## PD-C-7. 品質検証結果"
  mustShow:
    - 作業サマリ (agent 集約)
    - AC 裏取りの最終状態
    - 変更差分
    - 残リスク・チケット化候補
    - Yes / No の CLI
  omit:
    - step history
    - provider raw log
  approve:
    label: チケット完了
    description: この close-gate をそのまま通し、ticket を close して flow を完了します。
prompt:
  assistCheckpoints:
    - Acceptance Criteria の証跡、ユーザ向け検証案内、残リスクがすべて明示できる時だけ close を提案する。
    - gate 中にコードや証跡が変わったなら、close ではなく rerun 提案になる前提で考える。
guards:
  - id: close-summary-recorded
    type: note_section_updated
    path: current-note.md
    section: PD-C-10. クローズ準備
  - id: close-gate-accepted
    type: judgement_status
    artifactKind: close-gate
    accepted:
      - Ready
      - user_accepted
  - id: ac-verification-table
    type: ac_verification_table
    allowUnverified: false
  - id: explicit-approval
    type: human_approved
transitions:
  on_success: COMPLETE
  on_failure: PD-C-6
  on_human_approved: COMPLETE
  on_human_rejected: PD-C-6
  on_human_changes_requested: PD-C-6
