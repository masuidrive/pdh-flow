# pdh-c-v2-resume: variant of pdh-c-v2 that exercises F-001 engineer-resume.
#
# Difference vs pdh-c-v2.yaml: code_quality_review.repair is configured with
# `via: resume, resume_node: implement` so a repair_needed decision resumes
# the original implement provider session via `codex exec resume <id>`
# instead of spawning a fresh codex with the repair role.
#
# plan_review.repair stays on separate_node — plan-stage repair edits the
# plan section in current-note.md, not source code, so resume of the
# planner session is conceptually correct but not the case this smoke
# exercises.

flow: pdh-c-v2-resume
version: 1

defaults:
  timeout_minutes: 60
  idle_timeout_minutes: 5
  max_attempts: 2
  max_rounds: 6

variants:
  full:
    initial: assist
    label: フル
  light:
    initial: assist
    label: ライト

nodes:
  # ─────────────────────────────────────────────────────────────────────
  # 0. Pickup. Read ticket, set frontmatter, write Status section.
  # ─────────────────────────────────────────────────────────────────────
  assist:
    type: provider_step
    provider: claude
    role: assist
    prompt:
      intent: チケットを引き取り、対象範囲と前提を Status セクションに書き出す。
      note_section: assist
      commit_summary: Pick up ticket
    on_done: investigate_plan
    label: 引き取り
    summary: チケットを読み取り、対象範囲・前提・初期計画の素地を Status に置く。

  # ─────────────────────────────────────────────────────────────────────
  # 1. Investigation + plan. Single combined step (旧 PD-C-2 + PD-C-3).
  # ─────────────────────────────────────────────────────────────────────
  investigate_plan:
    type: provider_step
    provider: codex
    role: planner
    prompt:
      intent: 既存実装と影響範囲を読み、実装方針・変更ファイル・テスト計画・リスクを固定する。
      note_section: investigate_plan
      commit_summary: Investigate + plan
      checkpoints:
        - 既存 code / ticket / docs を読んで blast radius を決定する
        - 計画を 1 つの具体的な実装経路へ固定する
        - ownership・検証コマンド・リスクを明示する
    on_done:
      full: plan_review
      light: implement
    label: 調査と計画
    summary: 既存実装と影響範囲を読んだ上で、実装方針・変更ファイル・テスト計画を決める。

  # ─────────────────────────────────────────────────────────────────────
  # 2. Plan review (full のみ). Multi-reviewer + aggregator + repair.
  # ─────────────────────────────────────────────────────────────────────
  plan_review:
    macro: review_loop
    reviewers:
      - role: devils_advocate
        provider: claude
        count: 2
        focus:
          - 計画の修正方針に矛盾や見落としがないか
          - セキュリティや設計上の懸念を先回りして潰せているか
      - role: coding_engineer
        provider: claude
        count: 1
        focus:
          - 技術的実現可能性
          - 依存関係と既存パターンとの整合
          - 実装量と検証量の妥当性
      - role: critical
        provider: codex
        count: 1
        focus:
          - 致命的な問題だけを短く指摘する
    aggregator:
      provider: claude
      role: plan_aggregator
    repair:
      provider: codex
      role: plan_repair
    max_rounds: 6
    on_pass: plan_gate
    on_aborted: investigate_plan
    label: 計画レビュー
    summary: 計画を 4 reviewer で並列レビュー → aggregator が判定 → 必要なら修復ループ。

  # ─────────────────────────────────────────────────────────────────────
  # 3. Plan gate. Human approves the plan before implementation.
  # ─────────────────────────────────────────────────────────────────────
  plan_gate:
    type: gate_step
    approver_role: pdm
    show:
      - diff
      - judgement_summary
      - guardian_reasoning
      - blocking_findings
    outputs:
      approved: implement
      rejected: investigate_plan
      cancelled: human_intervention
    form:
      - name: comment
        kind: textarea
        required: false
        label: コメント
    label: 計画承認
    summary: PdM が計画を承認するゲート。差し戻しは investigate_plan へ。

  # ─────────────────────────────────────────────────────────────────────
  # 4. Implementation.
  # ─────────────────────────────────────────────────────────────────────
  implement:
    type: provider_step
    provider: codex
    role: implementer
    prompt:
      intent: 計画に従って実装し、テストとドキュメントの更新まで完了させる。
      note_section: implement
      commit_summary: Implement
      checkpoints:
        - 計画と差分を一致させる
        - テストを書き、`scripts/test-all.sh` 等を通す
        - 不要なリファクタを混ぜない
    on_done: code_quality_review
    label: 実装
    summary: 計画を実装し、テストを通す。

  # ─────────────────────────────────────────────────────────────────────
  # 5. Code quality review. Multi-reviewer + aggregator + repair.
  # ─────────────────────────────────────────────────────────────────────
  code_quality_review:
    macro: review_loop
    reviewers:
      - role: devils_advocate
        provider: claude
        count: 2
        focus:
          - セキュリティ脆弱性
          - 設計上の論理バグ
          - 目的から見た危険な抜け
      - role: code_reviewer
        provider: claude
        count: 2
        focus:
          - コード品質
          - 回帰
          - 認可漏れと整合性
          - エラーハンドリングとテスト妥当性
      - role: critical
        provider: codex
        count: 1
        focus:
          - 致命的な問題だけを短く指摘する
    aggregator:
      provider: claude
      role: code_quality_aggregator
    repair:
      provider: codex
      role: code_quality_repair
      # F-001/J4: resume the implement node's codex session instead of
      # spawning a fresh codex with the repair role. Falls back to fresh
      # automatically when sessions/implement.json is missing.
      via: resume
      resume_node: implement
    max_rounds: 6
    on_pass: final_verification
    on_aborted: implement
    label: 品質レビュー
    summary: 実装の品質、回帰、テスト不足、設計逸脱を 5 reviewer で洗う。

  # ─────────────────────────────────────────────────────────────────────
  # 6. Final verification. Single guardian pass on close-readiness.
  # ─────────────────────────────────────────────────────────────────────
  final_verification:
    type: guardian_step
    provider: claude
    role: final_verifier
    inputs_from: code_quality_review.aggregate
    outputs:
      pass: close_gate
      repair_needed:
        next: implement
        max_round_escalation: human_intervention
      escalate_human: human_intervention
    max_rounds: 1
    label: 最終確認
    summary: クローズ可否を最終判定 (AC・回帰・残リスク)。

  # ─────────────────────────────────────────────────────────────────────
  # 7. Close gate. Human approves before the merge happens.
  # ─────────────────────────────────────────────────────────────────────
  close_gate:
    type: gate_step
    approver_role: pdm
    show:
      - diff
      - judgement_summary
      - guardian_reasoning
      - git_log
      - related_tickets
    outputs:
      approved: close_finalize
      rejected: implement
      cancelled: human_intervention
    form:
      - name: comment
        kind: textarea
        required: false
        label: コメント
    label: クローズ承認
    summary: クローズ前の最終承認。差し戻しは implement、却下は人手対応へ。

  # ─────────────────────────────────────────────────────────────────────
  # 8. Close finalize. Deterministic system step (squash + done move).
  # ─────────────────────────────────────────────────────────────────────
  close_finalize:
    type: system_step
    action: close_ticket
    on_done: terminal
    on_failure: human_intervention
    label: クローズ実行
    params:
      keep_worktree: false

  # ─────────────────────────────────────────────────────────────────────
  # Terminal nodes.
  # ─────────────────────────────────────────────────────────────────────
  terminal:
    type: terminal
    outcome: success
    reason: ticket closed

  human_intervention:
    type: terminal
    outcome: needs_human
    reason: gate_rejected または max_rounds_exceeded により人手対応が必要
