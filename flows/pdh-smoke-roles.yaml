# Smoke flow exercising the new role-aware provider prompts (assist /
# planner / implementer) in one real LLM chain. Used by
# scripts/smoke-real-roles.sh — NOT part of npm run test:all.
#
# 3 LLM calls: claude (assist) → codex (planner) → codex (implementer).
# Expected runtime: ~2-3 min.

flow: pdh-smoke-roles
version: 1

variants:
  full:
    initial: smoke_assist

nodes:
  smoke_assist:
    type: provider_step
    provider: claude
    role: assist
    on_done: smoke_plan

  smoke_plan:
    type: provider_step
    provider: codex
    role: planner
    on_done: smoke_implement
    prompt:
      checkpoints:
        - 既存コードを読み計画を固定する
        - 変更ファイルとテスト方針を明記する

  smoke_implement:
    type: provider_step
    provider: codex
    role: implementer
    on_done: done
    prompt:
      checkpoints:
        - calc.py の TODO を実装する
        - tests があれば走らせて通す

  done:
    type: terminal
    outcome: success
    reason: smoke 3-role chain completed
