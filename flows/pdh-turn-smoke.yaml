# F-012/K6 smoke flow: a single provider_step with enable_user_input=true.
# Designed to deterministically exercise the in-step turn loop end-to-end:
# the role's prompt instructs the LLM to ask exactly one clarifying
# question (kind="ask") before producing the final answer.

flow: pdh-turn-smoke
version: 1

defaults:
  timeout_minutes: 15
  max_rounds: 1

variants:
  full:
    initial: ask_user

nodes:
  ask_user:
    type: provider_step
    provider: claude
    role: turn_smoke
    enable_user_input: true
    prompt:
      intent: F-012 turn-loop smoke
    on_done: terminal
    label: 質問テスト

  terminal:
    type: terminal
    outcome: success
    reason: turn-loop smoke finished
