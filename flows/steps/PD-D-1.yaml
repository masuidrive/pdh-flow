id: PD-D-1
role: epic_verifier
mode: edit
noteSection: PD-D-1. Exit Criteria 裏取り
commitSummary: Verify Exit Criteria
judgement:
  kind: exit-criteria-verification
  acceptedStatuses:
    - verified
    - user_accepted
display:
  label: Exit Criteria 裏取り
  summary: Epic の Exit Criteria 各項目について、配下 ticket の AC 表 / git log / 実装結果を根拠に verified / unverified を判定する。
  userAction: 各 Exit Criterion の裏取り結果と未達があるなら理由を確認する。
  viewer: 完了確認者
  decision: Epic の Exit Criteria が裏取りされたかどうか。
  mustShow:
    - Exit Criteria 裏取り表
    - 不足があれば対応方針案 (新 ticket / 別 Epic / accept)
  omit:
    - 古い review round
prompt:
  intent: Epic 配下の全 ticket と現状 main / epic branch の状態から、Exit Criteria 各項目の裏取りを行い verification.md を生成する。
  passWhen:
    - 全 Exit Criterion が verified または明示的に accept として記録されている
  onFindings:
    - unverified のまま残るなら risks に記録、必要なら新 ticket を提案する (この step では作成しない)
  assistCheckpoints:
    - 配下 ticket の closed_at と AC 裏取り結果を読んで、Exit Criteria への寄与を結びつける。
    - 環境的に裏取りできない条件は、PD-D-3 で UCS test するか、accept 扱いにする提案を出す。
guards:
  - id: verification-section-recorded
    type: note_section_updated
    path: current-note.md
    section: PD-D-1. Exit Criteria 裏取り
  - id: exit-criteria-verified
    type: judgement_status
    artifactKind: exit-criteria-verification
    accepted:
      - verified
      - user_accepted
transitions:
  on_success: PD-D-2
  on_failure: PD-D-1
