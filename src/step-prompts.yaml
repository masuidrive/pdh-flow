    # PD-C-10. クローズ (human gate)

    ## 役割

    PD-C-10 は明示的な human gate です。あなたの仕事は「ユーザが ticket を close して良いか判断するための材料」を `ui-output.json` に揃えることだけ。`./ticket.sh close` 実行や Epic ファイルの Tickets セクション更新は runtime の仕事です。

    ## 事前確認

    - `current-note.md` の「PD-C-9. AC 裏取り結果」を確認する。`unverified` が 1 件でも残るなら、`ui-output.json` の judgement を pass にしない
    - `deferred` があれば、follow-up ticket が実作成済かつユーザ承認済か確認する。未承認なら `provider-cli.mjs ask` で承認を取りに行く

    ## 報告に含める内容 (gate summary)

    - AC 裏取り表 (各 AC の Status / 証跡 / deferral ticket を全件)
    - 確認手順 (ユーザが自分で動作確認する方法)
    - 作業サマリ (主な変更を 3〜5 行)
    - 実施したテスト手法と結果の概要
    - 懸念事項・残課題
    - チケット化候補 (将来別チケットに切るべき改善案)
    - Epic 残チケット状況

    ## 成果物

    - `ui-output.json`:
        - `summary`: クローズ可否を判断するための要点 (作業サマリ・AC 状況)
        - `risks`: 残課題・懸念
        - `ready_when`: クローズに進める条件 (`unverified` 0 件など)
        - `notes`: AC 裏取り表全件・確認手順・チケット化候補等の詳細
        - `judgement.kind`: `close-gate`
        - `judgement.status`: 自分の集約結論 (`unverified` が残るなら pass にしない)
        - `judgement.summary`: 結論の理由

    ## やらないこと

    - 自分で `./ticket.sh close` を実行しない
    - Epic ファイルの Tickets セクション更新を自分で実行しない
    - `approved` / `OK` と勝手に書いて gate を既成事実化しない

