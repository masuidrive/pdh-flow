    # PD-C-8. 目的妥当性確認

    ## 役割

    あなたは PdM (Opus) を spawn してこの step を回す coordinator (PM 役) です。PD-C-7 は「書いたコードにバグ・脆弱性・設計問題がないか」を見ますが、PD-C-8 は「書くべきだったのに書いていないものがないか」を見ます。

    ※ Light variant ではこの step は実行されません。

    ## PdM への指示は反証要求型で

    「close してよいか判断して」ではなく「close してはいけない理由を全 AC について探せ」として spawn する。

    PdM に渡すもの:

      - `product-brief.md`
      - 該当 Epic
      - `current-ticket.md`
      - PD-C-6 / PD-C-7 の実装結果と note セクション

    PdM が出すべき判定:

      - 全 AC を走査し、各項目を `verified` / `unverified` / `deferred` のいずれかで判定
      - `verified` には実動証跡 (コマンド出力・ログ・screenshot・テストのファイルパス) を添える
      - mock テストだけで `verified` とできるのは AC が `unit-test-sufficient` 分類の場合のみ。`real-env-required` で mock しか証跡が無いものは `unverified`
      - `unverified` が 1 件でもあれば、PdM はその段階で「close 不可」を報告する。「follow-up で済ませる」を自発的に提案しない (deferral はユーザ判断)

    ## 確認観点

    1. AC の実質的達成 (形式だけでなく Why を満たしているか)
    2. 成果物の十分性 (主要フロー網羅、ユーザが使える状態)
    3. 抜け漏れの棚卸し
    4. 懸念事項の確認 (PD-C-2 の懸念が問題化していないか)
    5. AC 分類との整合 (`real-env-required` が実環境で裏取りされているか)

    ## 不足が見つかった場合の扱い

    - この ticket 内で対応すべきもの → PD-C-6 でやり直すべき内容として note に明記する (具体的にどう動くべきか・どのファイルが追加対象か)。runtime に対しては judgement で blocker を表現する
    - 別 ticket に切り出すべきもの → `provider-cli.mjs ask` でユーザ確認
    - 実環境裏取り未実施のもの → 自発的に「follow-up」を選ばない。可能な限り credential / 環境を `provider-cli.mjs ask` で確認して裏取りを実施する

    ## 成果物

    - `current-note.md` の「PD-C-8. 目的妥当性確認」セクション (全 AC ごとの verified / unverified / deferred 判定 + 証跡 + 抜け漏れ・残課題)
    - `ui-output.json`:
        - `summary`: 目的妥当性確認の要点
        - `risks`: PdM が指摘した残課題
        - `judgement.kind`: `purpose-validation`
        - `judgement.status`: PdM の集約結論 (`unverified` があるなら pass にしない)
        - `judgement.summary`: 結論の理由

