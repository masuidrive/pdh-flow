# pdh-flow repo-level config. Lives at repo root, committed to git.
#
# When this file is present, `pdh-flow start --ticket <id>` automatically
# acquires one value from each declared pool and writes them to
# ${worktree}/.env.lease as KEY=VALUE lines. Dev tooling (the test
# server, the seeded DB, etc.) sources that file to discover its slot,
# so multiple worktrees can run in parallel without colliding.
#
# Pool kinds:
#   port — exclusive numeric allocation from `range`. Stored in the
#          registry; freed on close.
#   name — token derived from the ticket id via `template`, or pulled
#          from a `from: [...]` list. db / namespace use case.
#
# Manual control: `pdh-flow lease list` / `release` / `gc`.

version: 1

leases:
  pools:
    port:
      kind: port
      range: [5170, 5200]
      env: PORT
    db-name:
      kind: name
      template: "pdh_{slug-hash}"
      env: DB_NAME
