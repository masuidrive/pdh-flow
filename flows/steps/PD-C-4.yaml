id: PD-C-4
role: aggregator
mode: review
noteSection: PD-C-4. 計画レビュー結果
commitSummary: Plan review
judgement:
  kind: plan_review
  acceptedStatuses:
    - No Critical/Major
    - user_accepted
review:
  maxRounds: 6
  defaultRerunStep: PD-C-3
display:
  label: 計画レビュー
  summary: 実装前に計画の妥当性、リスク、検証方針をレビューする。
  userAction: Critical/Major が残る場合は計画へ戻す。
  viewer: レビュー担当
  decision: この計画で本当に実装に入ってよいかを判断する。
  mustShow:
    - 計画要約
    - 想定 diff surface
    - 検証不足
    - Critical/Major 指摘
  omit:
    - 実装ログの時系列
prompt:
  intent: 実装前レビューとして、計画の穴、検証不足、目的ずれを潰してから実装承認へ進む。
  passWhen:
    - 全 reviewer role の最新結果が `No Critical/Major` である
    - または未解消点についてユーザが明示的に受け入れている
  onFindings:
    - Critical/Major は PD-C-3 に差し戻して計画を修正する
    - vague な caution ではなく、修正すべき内容を具体化する
  reviewerRules:
    - その計画の修正戦略が、この repo と ticket の目的に対して信頼できるか評価する。
    - 曖昧な注意書きではなく、具体修正として計画変更を PD-C-3 に返す。
  repairRules:
    - これは計画修正ループとして扱う。finding が code spike なしでは計画不可能だと示さない限り、app code 編集より `current-ticket.md` と `current-note.md` の更新を優先する。
    - 計画が実質的に変わったら、Product AC、implementation notes、PD-C-3 の計画 section を揃え続ける。
  assistCheckpoints:
    - 未解消の計画問題は、曖昧な注意書きではなく具体修正として PD-C-3 に返す。
guards:
  - id: plan-review-recorded
    type: note_section_updated
    path: current-note.md
    section: PD-C-4. 計画レビュー結果
  - id: no-critical-major
    type: judgement_status
    artifactKind: plan_review
    accepted:
      - No Critical/Major
      - user_accepted
transitions:
  on_success: PD-C-5
  on_failure: PD-C-3
