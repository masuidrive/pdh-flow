id: PD-C-9
role: aggregator
mode: review
noteSection: PD-C-9. プロセスチェックリスト
commitSummary: Final verification
judgement:
  kind: ac_verification
  acceptedStatuses:
    - Ready
    - user_accepted
review:
  maxRounds: 6
  defaultRerunStep: PD-C-6
display:
  label: 最終検証
  summary: テストと AC 裏取り表で、完了判断に必要な証跡を揃える。Full では PdM が反証要求型で目的妥当性も確認する。
  userAction: deferred / unverified の扱いと、PdM が出した目的ずれ / 抜け漏れ指摘 (full のみ) を確認する。
  viewer: 完了確認者
  decision: AC 裏取り・最終検証の証跡 + 目的妥当性 (full) が揃っているかを判断する。
  mustShow:
    - AC table
    - verify 結果
    - 外部 surface の確認結果
    - deferred / unverified の扱い
    - PdM の目的妥当性所見 (full のみ; missing_implementation / plan_misalignment / needs_user_decision)
  omit:
    - 古い review round の全履歴
prompt:
  intent: 完了承認に必要な AC 裏取りと consumer 視点の最終検証証跡を揃える。
  passWhen:
    - AC 裏取り表が完成し、`unverified` が 0 件である
    - 変更した外部 surface に対する最終観察結果が揃っている
  onFindings:
    - 裏取り不足や surface blocker があれば PD-C-6 に戻す
  reviewerRules:
    - '`Acceptance Criteria` の `unverified` 行や外部 surface の証跡欠落は blocking として扱う。'
    - notes の主張と直接証拠が食い違う時は、直接証拠を優先する。
  repairRules:
    - これは final-verification 修正ループとして扱う。欠けた AC 証跡や最終検証ギャップを埋め、なかったことにしない。
    - 外部 surface の観察で問題が出たなら、次の review round 前にその surface か証跡を直す。
  assistCheckpoints:
    - すべての `Acceptance Criteria` 項目に、`Acceptance Criteria 裏取り結果` 内で明示的な証拠が必要。
    - 変わった user-facing surface は、unit-style の証拠だけでなく consumer 視点でも確認する。
guards:
  - id: process-checklist
    type: note_section_updated
    path: current-note.md
    section: PD-C-9. プロセスチェックリスト
  - id: ac-verification-table
    type: ac_verification_table
    allowUnverified: false
transitions:
  on_success: PD-C-10
  on_failure: PD-C-6
