# pdh-flow: ticket-scoped flow (the canonical ticket cycle).
#
# Validated against pdh-flow/schemas/flow.schema.json. Macros (review_loop)
# are expanded by the engine loader to flat-flow.schema.json shape before
# the XState machine is compiled.
#
# Provider selection lives in the top-level `providers:` block — pick a
# profile at run time with `--providers <name>` (CLI) or the profile
# selector in the Web UI. Each profile's `default` is the fallback used
# when neither the node-id nor the role is explicitly mapped. Lookup
# priority at invocation: node-id > role > default.

flow: pdh-flow
version: 1

defaults:
  timeout_minutes: 60
  idle_timeout_minutes: 5
  max_attempts: 2
  max_rounds: 6

providers:
  default:
    label: Mixed (Claude + Codex)
    description: |
      推奨。推論が重いノード (plan_review aggregate / final_verifier /
      purpose_validator) を Opus、それ以外の思考系を Sonnet、機械的な
      implementer / repair / critical を Codex で回す canonical な
      混合プロファイル。Claude サブスクリプションを消費。
    default: sonnet
    investigate_plan: codex
    implement: codex
    critical: codex
    code_quality_review.repair: codex
    plan_review.repair: codex
    final_verifier: opus
    purpose_validator: opus
    plan_aggregator: opus
    code_quality_aggregator: opus

  codex:
    label: All Codex (dogfood)
    description: |
      全ノードを Codex CLI 経由で実行する dogfood / 開発用プロファイル。
      Claude のサブスクリプションを消費しないので、繰り返しテストや
      回帰確認に向く。本番品質より走行コストを優先する場合に。
    default: codex

variants:
  full:
    initial: assist
    label: フル
    description: |
      各レビュー段で 4 人 (coding_engineer / code_reviewer / critical /
      devils_advocate) がレビュー。本番品質。
  light:
    initial: assist
    label: ライト
    description: |
      レビューを 1〜2 人に間引く軽量版。スモーク / 試運転 / 軽い ticket 向け。
      重大欠陥の見落とし可能性は full より高い。

nodes:
  # ─────────────────────────────────────────────────────────────────────
  # 0. Pickup. Read ticket, set frontmatter, write Status section.
  # ─────────────────────────────────────────────────────────────────────
  assist:
    type: provider_step
    role: assist
    prompt:
      intent: チケットを引き取り、対象範囲と前提を Status セクションに書き出す。各 AC に検証手段（自動テストで十分なもの / 実プロセス起動が必要なもの / 実 API / 外部サービス必須のもの）を分類タグで付け、`real-env-required` が 1 件でもあれば必要な credential / 外部サービス / ハードを列挙する。
      note_section: assist
      commit_summary: Pick up ticket
    on_done: investigate_plan
    label: 引き取り
    summary: チケットを読み取り、対象範囲・前提・初期計画の素地と AC 分類を Status に置く。real-env-required AC の事前準備事項もここで明示する。

  # ─────────────────────────────────────────────────────────────────────
  # 1. Investigation + plan. Single combined step (investigation and
  #    planning are intentionally merged — see project convention).
  # ─────────────────────────────────────────────────────────────────────
  investigate_plan:
    type: provider_step
    role: planner
    prompt:
      intent: 既存実装と影響範囲を読み、実装方針・変更ファイル・テスト計画・リスクを固定する。
      note_section: investigate_plan
      commit_summary: Investigate + plan
      checkpoints:
        - 既存 code / ticket / docs を読んで blast radius を決定する
        - 計画を 1 つの具体的な実装経路へ固定する
        - ownership・検証コマンド・リスクを明示する
    on_done:
      full: plan_review
      light: implement
    label: 調査と計画
    summary: 既存実装と影響範囲を読んだ上で、実装方針・変更ファイル・テスト計画を決める。

  # ─────────────────────────────────────────────────────────────────────
  # 2. Plan review (full のみ). Multi-reviewer + aggregator + repair.
  # ─────────────────────────────────────────────────────────────────────
  plan_review:
    macro: review_loop
    reviewers:
      - role: devils_advocate
        count: 2
        focus:
          - 計画の修正方針に矛盾や見落としがないか
          - セキュリティや設計上の懸念を先回りして潰せているか
      - role: coding_engineer
        count: 1
        focus:
          - 技術的実現可能性
          - 依存関係と既存パターンとの整合
          - 実装量と検証量の妥当性
      - role: critical
        count: 1
        focus:
          - 致命的な問題だけを短く指摘する
    aggregator:
      role: plan_aggregator
    repair:
      role: plan_repair
    max_rounds: 6
    on_pass: plan_gate
    on_aborted: investigate_plan
    label: 計画レビュー
    summary: 計画を 4 reviewer で並列レビュー → aggregator が判定 → 必要なら修復ループ。

  # ─────────────────────────────────────────────────────────────────────
  # 3. Plan gate. Human approves the plan before implementation.
  # ─────────────────────────────────────────────────────────────────────
  plan_gate:
    type: gate_step
    approver_role: pdm
    show:
      - diff
      - judgement_summary
      - guardian_reasoning
      - blocking_findings
    outputs:
      approved: implement
      rejected: investigate_plan
      cancelled: human_intervention
    form:
      - name: comment
        kind: textarea
        required: false
        label: コメント
    label: 計画承認
    summary: PdM が計画を承認するゲート。差し戻しは investigate_plan へ。

  # ─────────────────────────────────────────────────────────────────────
  # 4. Implementation. Scope-only tests during this step; the full suite
  #    runs separately in the `qa` system_step so a single test failure
  #    routes repair correctly without conflating "feature not done" with
  #    "broke something unrelated".
  # ─────────────────────────────────────────────────────────────────────
  implement:
    type: provider_step
    role: implementer
    prompt:
      intent: 計画に従って実装し、変更スコープに関係するテストとドキュメントを更新する。フルスイートは qa が走らせる。
      note_section: implement
      commit_summary: Implement
      checkpoints:
        - 計画と差分を一致させる
        - スコープに関連するユニット/インテグレーションテストを更新して通す
        - 不要なリファクタを混ぜない
    on_done: qa
    label: 実装
    summary: 計画を実装し、スコープ内テストを通す。フル回帰は qa が担当。

  # ─────────────────────────────────────────────────────────────────────
  # 4b. QA — engine-driven full-suite runner. system_step (not provider)
  #     so the verdict comes from the script's exit code, not an LLM
  #     interpreting test output. Replaces the skill's "spawn a QA
  #     Engineer" step with a deterministic test-runner; independence
  #     from `implement` is preserved by running in a separate process,
  #     not by spawning a second model. See CLAUDE.md "LLM is evidence,
  #     not authority".
  # ─────────────────────────────────────────────────────────────────────
  qa:
    type: system_step
    action: run_qa_script
    params:
      script: scripts/test-all.sh
      timeout_seconds: 1800
    on_done: code_quality_review
    on_failure: implement
    label: フルスイート

  # ─────────────────────────────────────────────────────────────────────
  # 5. Code quality review. Multi-reviewer + aggregator + repair.
  #    Light variant reduces the reviewer set (Devil's Advocate ×1 +
  #    Critical ×1) by zeroing the other counts; the expand-macro stage
  #    resolves CountSpec to integer per variant.
  # ─────────────────────────────────────────────────────────────────────
  code_quality_review:
    macro: review_loop
    reviewers:
      - role: devils_advocate
        count:
          full: 2
          light: 1
        focus:
          - セキュリティ脆弱性
          - 設計上の論理バグ
          - 目的から見た危険な抜け
      - role: code_reviewer
        count:
          full: 2
          light: 0
        focus:
          - コード品質
          - 回帰
          - 認可漏れと整合性
          - エラーハンドリングとテスト妥当性
      - role: critical
        count:
          full: 1
          light: 1
        focus:
          - 致命的な問題だけを短く指摘する
    aggregator:
      role: code_quality_aggregator
    repair:
      role: code_quality_repair
    max_rounds: 6
    on_pass: final_verification
    on_aborted: implement
    label: 品質レビュー
    summary: 実装の品質、回帰、テスト不足、設計逸脱を full=5 reviewer / light=2 reviewer で洗う。

  # ─────────────────────────────────────────────────────────────────────
  # 6. Final verification. Editable provider that drives the deliverable
  #    end-to-end (e.g. starts a dev server + agent-browser session for
  #    webapps) and stages the visual / functional evidence the human
  #    will look at in close_gate. Decision authority moves to close_gate.
  # ─────────────────────────────────────────────────────────────────────
  final_verification:
    type: provider_step
    role: final_verifier
    on_done: purpose_validation
    on_failure: human_intervention
    label: 最終確認
    summary: 成果物を実環境で動かしてエビデンス (スクショ等) を採取。

  # ─────────────────────────────────────────────────────────────────────
  # 6b. Purpose validation (PdM falsification). Reads the AC
  #     table + diff; rejects close if any AC is `unverified` or if
  #     something in the ticket's What/AC was silently dropped. Profile
  #     pins opus for product-judgment reasoning in the default profile.
  # ─────────────────────────────────────────────────────────────────────
  purpose_validation:
    type: provider_step
    role: purpose_validator
    prompt:
      intent: 未検証 AC や暗黙の scope ドロップを最終チェックし、見つけたら close を reject する。
      note_section: purpose_validation
      commit_summary: Purpose validation
    on_done:
      full: close_gate
      light: close_gate
    on_failure: implement
    label: 目的検証
    summary: PdM 視点で未検証 AC や scope ドロップを最終チェックして reject する。

  # ─────────────────────────────────────────────────────────────────────
  # 7. Close gate. Human approves before the merge happens.
  # ─────────────────────────────────────────────────────────────────────
  close_gate:
    type: gate_step
    approver_role: pdm
    show:
      - diff
      - judgement_summary
      - guardian_reasoning
      - git_log
      - related_tickets
    outputs:
      approved: close_finalize
      rejected: implement
      cancelled: human_intervention
    form:
      - name: comment
        kind: textarea
        required: false
        label: コメント
    label: クローズ承認
    summary: クローズ前の最終承認。差し戻しは implement、却下は人手対応へ。

  # ─────────────────────────────────────────────────────────────────────
  # 8. Close finalize. Deterministic system step (squash + done move).
  # ─────────────────────────────────────────────────────────────────────
  close_finalize:
    type: system_step
    action: close_ticket
    on_done: terminal
    on_failure: human_intervention
    label: クローズ実行
    params:
      keep_worktree: false

  # ─────────────────────────────────────────────────────────────────────
  # Terminal nodes.
  # ─────────────────────────────────────────────────────────────────────
  terminal:
    type: terminal
    outcome: success
    reason: ticket closed

  human_intervention:
    type: terminal
    outcome: needs_human
    reason: gate_rejected または max_rounds_exceeded により人手対応が必要
