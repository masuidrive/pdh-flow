id: PD-C-3
role: planner
mode: edit
noteSection: PD-C-3. 調査と計画
commitSummary: Investigate + plan
display:
  label: 調査と計画
  summary: 既存実装と影響範囲を読んだうえで、実装方針・変更ファイル・テスト計画・リスク対応を決める。
  userAction: 計画に違和感があれば PD-C-5 前に割り込みで修正指示する。
  viewer: 実装担当
  decision: この ticket で実際にどのファイルをどう触るかを判断する。
  mustShow:
    - 調査結果 (blast radius・関連 ticket・技術懸念)
    - 実装方針
    - 変更ファイル
    - テスト方針
    - リスク対応
    - durable な設計判断
  omit:
    - 過去 step の history 一覧
  skipDefaultSchema: true
prompt:
  assistCheckpoints:
    - 既存 code / ticket / docs を読んで blast radius を固めたうえで、計画を 1 つの具体的な実装経路へ固定する。
    - ownership、検証コマンド、リスクを明示し、PD-C-6 がぶれずに実行できるようにする。
guards:
  - id: plan-recorded
    type: note_section_updated
    path: current-note.md
    section: PD-C-3. 調査と計画
  - id: ticket-implementation-notes
    type: ticket_section_updated
    path: current-ticket.md
    section: Implementation Notes
  - id: step-commit
    type: step_commit_recorded
transitions:
  on_success:
    light: PD-C-5
    full: PD-C-4
