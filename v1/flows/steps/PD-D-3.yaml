id: PD-D-3
role: ucs_tester
mode: edit
noteSection: PD-D-3. UCS テスト結果
commitSummary: UCS verification
judgement:
  kind: ucs-test
  acceptedStatuses:
    - pass
    - user_accepted
display:
  label: UCS テスト
  summary: Epic Outcome を end-to-end のユーザケースで実機検証し、verification.md と screenshots を残す。
  userAction: UCS テストの観察結果とスクショを確認する。
  viewer: 確認者
  decision: Epic Outcome が外部から見えるレベルで動いているかを確認する。
  mustShow:
    - 試したユーザケース
    - 観察結果 (期待動作との一致 / 不一致)
    - 添付スクショへのリンク
  omit:
    - 個別 ticket の PD-C-9 表 (PD-D-1 で集約済)
prompt:
  intent: Epic 全体を end-to-end の user case で実機テストし、Outcome 達成の証跡を残す。
  passWhen:
    - 主要ユースケースで Outcome が観察可能
    - スクショや CLI 出力など、後年 archaeology できる証跡を残した
  onFindings:
    - 期待動作と乖離があれば PD-D-1 に戻して原因 ticket を再検証
  assistCheckpoints:
    - スクショは epics/done/<slug>/screenshots/ に配置 (WebP q80、長辺 1280px、3〜5 枚)。runtime が close 時に圧縮する。
    - verification.md は epics/done/<slug>/verification.md。試した内容・観察結果・残懸念を記述。
guards:
  - id: ucs-section
    type: note_section_updated
    path: current-note.md
    section: PD-D-3. UCS テスト結果
  - id: verification-md-exists
    type: file_exists
    path: epics/done/<slug>/verification.md
    optional: true
  - id: ucs-judgement
    type: judgement_status
    artifactKind: ucs-test
    accepted:
      - pass
      - user_accepted
transitions:
  on_success: PD-D-4
  on_failure: PD-D-3
