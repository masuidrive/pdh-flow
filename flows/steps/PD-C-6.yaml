id: PD-C-6
role: coding_engineer
mode: edit
noteSection: PD-C-6. 実装
commitSummary: Implementation
display:
  label: 実装
  summary: 承認済み計画に沿ってコード、テスト、note/ticket を更新する。
  userAction: 実装中の不明点が出たら answer で回答する。
  viewer: 実装担当
  decision: いま何を実装し、何で止まっているかを判断する。
  mustShow:
    - 承認済み計画の要点
    - 現在の provider 結果
    - 未通過 guard
    - 必要な test / commit
    - 割り込み質問
  omit:
    - 古い gate 決定の履歴
prompt:
  assistCheckpoints:
    - 現在の repo 証跡が scoped correction を要求しない限り、承認済み計画の範囲内に留まり、その修正は記録する。
    - まず最小限で意味のある検証を行い、blast radius が広い時だけその後に広い確認を追加する。
guards:
  - id: tests-pass
    type: command
    command: scripts/test-all.sh
    optional: true
  - id: note-updated
    type: note_section_updated
    path: current-note.md
    section: PD-C-6
  - id: step-commit
    type: step_commit_recorded
transitions:
  on_success: PD-C-7
  on_failure: PD-C-6
