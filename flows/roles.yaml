version: 1
roles:
  devils_advocate:
    kind: reviewer
    label: Devil's Advocate
    responsibility: ユーザ側の立場から、見落とし、論理矛盾、セキュリティや設計上の危険を厳しく見る。

  coding_engineer_reviewer:
    kind: reviewer
    label: Coding Engineer Reviewer
    responsibility: 技術的実現可能性、依存関係、実装量、既存パターンとの整合を見る。

  code_reviewer:
    kind: reviewer
    label: Code Reviewer
    responsibility: コード品質、回帰、認可漏れ、整合性、エラーハンドリング、テスト妥当性を見る。

  critical_reviewer:
    kind: reviewer
    label: Critical Reviewer
    responsibility: 致命的な問題だけを短く指摘する。

  pdm_counterexample:
    kind: reviewer
    label: PdM Counterexample Reviewer
    responsibility: close してはいけない理由、未達 AC、目的ずれを反証要求型で探す。

  ac_verifier:
    kind: reviewer
    label: AC Verifier
    responsibility: AC ごとの証跡、裏取り表、最終検証の妥当性を確認する。

  surface_observer:
    kind: reviewer
    label: Surface Observer
    responsibility: UI / HTTP API / SDK / CLI の consumer 視点で、自動テストでは拾いにくい違和感を観察する。

  coding_engineer:
    kind: engineer
    label: Coding Engineer
    responsibility: 承認済み計画に従ってコード・テストを実装し、実装→テストのループを通じて全テストパス状態で PM に返す。
    skills: [pdh-coding]

  repair:
    kind: repair
    label: Repair Engineer
    responsibility: review-loop の blocker findings を解消するためにコード・テスト・canonical files を修正する。
    skills: [pdh-coding]

  investigator:
    kind: planner
    label: Investigator
    responsibility: 既存実装、影響範囲、リスク、検証方法を確認し、後続の計画を拘束できるだけの事実を固める。

  planner:
    kind: planner
    label: Planner
    responsibility: 調査結果とチケット意図から、実装担当がそのまま実行できる単一の具体計画に落とす。

  aggregator:
    kind: aggregator
    label: Aggregator
    responsibility: 並行起動した reviewer 群の review.json を dedupe・consensus 把握・blocker 抽出して step の集約 judgement を出す。reviewer の severity を集約段階で下げない。

  purpose_validation:
    kind: assist-escalation
    label: Purpose Validation
    responsibility: PdM 視点で「書くべきだったのに書いていないもの」「目的ずれ」を反証要求型で探す。AC 裏取り表は最終検証 step の責務として扱う。

  close_gate:
    kind: assist-escalation
    label: Close Gate
    responsibility: AC 裏取り表・最終検証 judgement を読み、ticket close 判断のための gate summary を ui-output.json に集約する。close 自体の実行は runtime の仕事。

skills:
  pdh-coding:
    label: PDH Coding Standards
    body: |
      # PDH Coding Standards

      Coding Engineer が実装時に従うルール。PM (リード) から spawn されたら、作業開始前にこのスキルを読むこと。

      ## 作業開始手順

      1. `product-brief.md` を読む (全判断の基準)
      2. `current-ticket.md` で Acceptance Criteria を確認する
      3. `current-note.md` の PD-C-3 計画を読み、自分の担当範囲を確認する
      4. spawn プロンプトで指定されたファイル範囲外を変更しない。必要な場合はリードに相談する

      **Worktree 運用**: PM が `EnterWorktree` 済みの場合、このセッション (subagent) も同じ worktree の cwd を継承している。特別な `cd` 指定は不要。ただし `codex exec` など外部プロセスを起動する場合のみ `cd <worktree> && codex exec ...` 形式で明示する (外部プロセスは Claude のセッション cwd を知らないため)。

      **設計意図の探し方:** 既存コードの意図が不明な場合は `git blame <file>` でコミットを特定 → コミットメッセージの ticket 名 → `tickets/done/` → Epic (`epics/done/`) → `product-brief.md` の順で辿る。推測で変更せず、意図を確認してから手を入れること

      ## Codex / 外部モデルで実行される場合

      - **チケット操作 (`./ticket.sh`) やチケットファイルの作成・編集は一切行わないこと。** チケット管理は PM の責務
      - チケット作成や計画変更が必要だと判断した場合は、**レスポンスとして PM に依頼する** (自分で実行しない)

      ## 実装ルール (PD-C-6 / PD-C-7 修正)

      計画に従って実装する。計画にないことはやらない。

      - **パターン踏襲**: 既存コードの規約・パターンに従う。新しいパターンを導入しない
      - **ファイル所有権**: 他の Coding Engineer の担当ファイルに触らない
      - **テスト**: 実装したコードに対するテストを書く。テストが通る状態を維持する
      - **実装→テストのループ**: 実装とテスト実行を Coding Engineer 自身が繰り返し、全件パスした状態で PM に返すこと。テスト未実行のまま返さない
      - **重複検出 (テスト前)**: 実装完了後、テスト実行前に `similarity-ts` / `similarity-py` で変更ファイル間の構造的重複を検出する。閾値を超える重複が見つかった場合は共通化を検討してからテストに進む。重複が意図的 (テスト setup 等) な場合はそのまま進めてよい
      - **PD-C-6 完了条件**: `CLAUDE.md` の「テスト」セクションを読み、記載されたテストコマンドを実行して all passed になること。結果をレスポンスに含める
      - **コミット**: テスト全件パス後、PM がコミットを行う

      ## コミットに含めてよいコードの基準

      - **「あとで直す」前提の仮コードはコミットしない。** TODO コメント付きのハードコード値、ダミー実装、意図的に壊れたままのコードはコミット対象外
      - **未完成の機能はインタフェース (型・シグネチャ・スキーマ) だけ用意し、実装は入れない。** 呼び出し側が依存できる契約だけを残し、中身は次のチケットで埋める
      - **コミットした時点でテストが通る状態を維持する。** 「あとでテストを追加する」は許容しない

      ## 実装品質ルール

      ### 型安全性
      - **Union 型の discriminator には `Literal` を使う。** `type: str` ではなく `type: Literal["text"]` で型チェッカーに不正な値を検出させる

      ### 防御的プログラミング
      - **コストの高い処理の前に軽量な事前チェックを入れる。** decode/parse/DB アクセスの前に、入力長やフォーマットの明らかな異常を弾く
      - **エラーメッセージには具体的な数値を含める。** 何が・いくつで・上限がいくつかを明示し、呼び出し元のデバッグを助ける

      ### ミドルウェア・フィルタ
      - **short-circuit するパスは、下流をバイパスする影響を考慮する。** ログ・クリーンアップ・リソース解放など、下流が担っていた責務を自身で補う
      - **ネットワーク越しの接続は途中切断に備える。** レスポンス送信後も相手側のストリームを正しく閉じる

      ### テスト実装
      - **allowlist/denylist のバリエーションには `@pytest.mark.parametrize` を使う。** 網羅性と保守性を両立させる
      - **ミドルウェアやフィルタのテストでは、正常系だけでなく拒否後の後処理 (ログ・drain・状態遷移) もカバーする**

      ### 有料 API キーの使用ルール (`.env` のキー)

      プロジェクトの `.env` に置かれている有料 API キー (OpenAI、Gemini、Anthropic 等) は、AC 裏取りに加え **開発中の動作確認・挙動調査でも使ってよい**。ただし以下を厳守する:

      - **自動テスト (unit / integration / E2E / CI) では使わない**。テストは mock / stub / fixture で動かす。実 API を叩くテストは flake・コスト・レート制限の原因になる
      - **100 回以上の呼び出しを伴う操作を始める前に、ユーザにコストを確認する**。reindex で全 page を embed、大量 seed に対する bulk embedding、loop での LLM call 等、合計呼び出し数が **100 回を超える見込み**になったら、着手前に「このキー・このモデル・この回数で概算 $X かかるが進めてよいか」を提示する
      - 見積りには **モデル単価 × 入力トークン × 呼び出し数** を使う。概算でよいので金額を提示する
      - 100 回未満でも、単価の高いモデル (GPT-4 クラスの completion、長文 embedding 大量バッチ等) で目立つコストになりそうな場合は同様に確認する
      - **キーをログ・commit・エラーメッセージ・スクショに出さない**
      - 呼び出し回数が読めない (ループの終端条件がデータ依存など) ケースでは、先に 1-2 件の dry-run でスケール感を測ってから判断する

      ## DB スキーマ設計ルール

      DB スキーマはコードより変更コストが高い。migration は事実上不可逆であり、一度入った負債は長期間残る。

      - **既存スキーマを先に読む**。新しいテーブル・カラムを追加する前に、関連する既存テーブルの構造・制約・命名規則を確認し、整合させる
      - **正規化を崩さない**。冗長カラムや非正規化は、明確なパフォーマンス根拠がある場合のみ。根拠は Implementation Notes に記録する
      - **制約を DB レベルで入れる**。NOT NULL・UNIQUE・FK・CHECK はアプリ層ではなく DB 制約として定義する。アプリ層のバリデーションだけに頼らない
      - **命名は既存に合わせる**。テーブル名・カラム名・インデックス名の規則を既存から読み取り、踏襲する
      - **migration は可逆にする**。upgrade と downgrade の両方を書き、downgrade で孤立データが残らないようにする
      - **既存データの扱いを考慮する**。カラム追加時のデフォルト値、NOT NULL 化時の backfill、リネーム時の旧データ移行を計画する

      ## テスト設計ルール

      - **テストは「アプリがこう動くべき」 (desired state) を記述する**。現在の仕様における正しい振る舞いを定義するもの
      - **変更の動作確認テストはコードに含めない**。変更が正しく適用されたかの検証 (例: API リネーム後に旧 URL が 404 を返す) は一時的な確認であり、テストスイートにコミットしない
      - テスト項目の判断基準: 「このテストはアプリの望ましい状態を記述しているか？」→ Yes ならコミット対象、No (変更の副作用確認など) なら一時確認のみ

      ## コンテキスト管理

      - コンパクション時に以下を必ず保持すること: 現在のチケット名、現在の PD フェーズ、未解決の懸念事項、ユーザから得た判断・承認
      - 関連のないタスク間では `/clear` でコンテキストをリセットする
      - 調査が大規模になる場合はサブエージェントに委譲し、メインのコンテキストを実装に集中させる
